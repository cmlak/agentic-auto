{% extends 'base_4_assets.html' %}
{% load crispy_forms_tags %}

{% block title %}Asset Registration{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">Register New Fixed Asset</h4>
                </div>
                <div class="card-body">
                    <form method="post" novalidate>
                        {% csrf_token %}
                        {% crispy form %}
                        
                        <div class="d-grid mt-4">
                            <button type="submit" class="btn btn-primary">Save Asset Record</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    const purchaseCosts = {{ purchase_costs_json|safe }};
    function updatePurchaseCost(selectElem) {
        const purchaseId = selectElem.value;
        const costField = document.getElementById('id_purchase_cost');
        if (purchaseId && purchaseCosts[purchaseId] !== undefined) {
            costField.value = purchaseCosts[purchaseId];
        }
    }
</script>
{% endblock %}
