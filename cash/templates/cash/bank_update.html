{% extends 'base_2_cash.html' %} 
{% load crispy_forms_tags %}

{% block content %}
<div class="container">
    <div class="row d-flex justify-content-center">
        <div class="col-sm-12 col-md-8 col-lg-6 text-center py-2">
            <h2>Update Bank Transaction</h2>
        </div>
    </div><hr>

    <div class="row d-flex justify-content-center mt-3">
        <div class="col-sm-12 col-md-10 col-lg-8">
            <form action="" method="post" id="txnForm">
                {% csrf_token %}
                {% crispy form %}
                <div class="row d-flex justify-content-center">
                    <div class="col text-center py-4">
                        <button type="submit" id="submitBtn" class="btn btn-primary mx-2" style="width: 150px;">Update</button>
                        <a href="{% url 'cash:bank_list' %}" class="btn btn-secondary mx-2" style="width: 150px;">Cancel</a>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
