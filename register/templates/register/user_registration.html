<!DOCTYPE html>
{% extends 'base_1.html' %}
{% load static %}

{% block content %}
<body>
  <div class="container"> 
    <div class="row">  
      <div class="col-12 col-md-6 offset-md-3"> 
        <form action="{% url 'register:registration' %}" method="post" autocomplete="off">
          {% csrf_token %}
          <h1>Sign Up</h1>
          <hr>
          <div class="form-group"> 
            <label for="username"><b>User Name</b></label>
            <input type="text" class="form-control" placeholder="Enter User Name: " name="username" required autocomplete="off"> 
            <label for="firstname"><b>First Name</b></label>
            <input type="text" class="form-control" placeholder="Enter First Name: " name="firstname" required autocomplete="off"> 
            <label for="lastname"><b>Last Name</b></label>
            <input type="text" class="form-control" placeholder="Enter Last Name: " name="lastname" required autocomplete="off"> 
            <label for="psw"><b>Password</b></label>
            <input type="password" class="form-control" placeholder="Enter Password: " name="psw" required autocomplete="new-password"> 
            <label for="email"><b>Email Adress</b></label>
            <input type="email" class="form-control" placeholder="Enter Email Adress: " name="email" required autocomplete="off">
            <label for="department"><b>Department</b></label> 
            <input type="text" class="form-control" placeholder="Enter Department: " name="department" autocomplete="off">
            
            {% if message %}
            <div class="alert alert-warning"> 
              {{ message }}
            </div>
            {% endif %}
            <button class="btn btn-primary" type="submit">Sign up</button> 
          </div>
        </form>
      </div>
    </div>
  </div>
</body>
{% endblock content %}
