{% extends 'base_1_tools.html' %}
{% load crispy_forms_tags %}

{% block title %}{% if object %}Update{% else %}New{% endif %} Journal Voucher{% endblock %}

{% block content %}
<div class="container mt-4 mb-5">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <div class="card shadow-sm border-0">
                <div class="card-header bg-white py-3">
                    <h3 class="mb-0 text-primary">{% if object %}Update{% else %}New{% endif %} Journal Voucher</h3>
                </div>
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        {% crispy form %}
                        <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                            <a href="{% url 'tools:journal_voucher_list' %}" class="btn btn-secondary px-4">Cancel</a>
                            <button type="submit" class="btn btn-success px-4">Save Entry</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
